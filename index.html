<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Polite Robot — precision tools for user research</title>
<meta name="description" content="A suite of focused tools for UX research, from job-market intelligence to recommendation-adoption tracking." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- ============================================================================
  THE ONE PLACE TO POINT TO YOUR APPS.

  Edit the APPS list below. Each app has:
    name     — the app's name
    kind     — a short category label (shown in mono over the name)
    blurb    — one plain line describing what it does
    url      — where "Open" goes. Use "#" while it isn't deployed yet.
    status   — "live"  (clickable, shows Open)  or  "soon"  (dimmed, not linked)

  Add, remove, or reorder freely. The page rebuilds itself from this list.
============================================================================ -->
<script>
const APPS = [
  { name: "Meridian", kind: "Intelligence", blurb: "UX research job-market intelligence.",           url: "https://meridian-fawn-iota.vercel.app", status: "live" },
  { name: "Ledger",   kind: "Adoption",     blurb: "Track whether your recommendations get adopted.", url: "https://ledger-sigma-five.vercel.app",   status: "live" },
];
</script>

<style>
  :root, [data-theme="dark"] {
    --bg:      #081b33;   /* deep midnight — the dark room */
    --panel:   #0d2748;   /* tool module */
    --panel-2: #113159;   /* module hover */
    --sky:     #00BCEB;   /* illuminated accent */
    --accent:  #4aa6ff;   /* link accent, legible on dark */
    --text:    #eaf2fb;
    --text-strong: #ffffff;
    --muted:   #8ba6c6;
    --dim:     #56749a;
    --line:    rgba(122,170,214,0.14);
    --line-sky:rgba(0,188,235,0.22);
    --grid:    rgba(122,170,214,0.14);
  }
  [data-theme="light"] {
    --bg:      #F4F7FB;   /* ground — the daylight bench */
    --panel:   #ffffff;
    --panel-2: #eef3fa;
    --sky:     #00BCEB;
    --accent:  #0070D2;
    --text:    #223a5c;
    --text-strong: #0D274D;
    --muted:   #5a7395;
    --dim:     #93a8c4;
    --line:    rgba(13,39,77,0.12);
    --line-sky:rgba(0,188,235,0.40);
    --grid:    rgba(13,39,77,0.05);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    /* faint tool grid in the backdrop */
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 64px 64px, 64px 64px;
    background-position: -1px -1px;
    min-height: 100vh;
    transition: background-color .25s ease, color .25s ease;
  }
  a { color: inherit; text-decoration: none; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px; }

  /* ── top bar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0 0;
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand .led {
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--sky); box-shadow: 0 0 12px var(--sky), 0 0 3px var(--sky);
  }
  .brand .name { font-weight: 700; font-size: 16px; letter-spacing: 0.2px; }
  .sys { color: var(--dim); font-size: 11.5px; letter-spacing: 0.5px; }

  /* ── hero ── */
  .hero { padding: 74px 0 20px; }
  .eyebrow {
    color: var(--sky); font-size: 11.5px; letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 22px; font-weight: 500;
  }
  .hero h1 {
    font-weight: 300; font-size: clamp(38px, 6.4vw, 76px); line-height: 1.02;
    letter-spacing: -0.03em; margin: 0; max-width: 15ch;
  }
  .hero h1 b { font-weight: 700; color: var(--text-strong); }
  .hero p {
    color: var(--text); font-size: clamp(17px, 2.1vw, 23px); line-height: 1.4; font-weight: 300;
    letter-spacing: -0.01em; max-width: 24ch; margin: 22px 0 0;
  }

  /* ── signature: the signal line ── */
  .signal {
    position: relative; height: 2px; margin: 40px 0 0;
    background: linear-gradient(90deg, transparent, var(--line-sky) 12%, var(--line-sky) 88%, transparent);
    overflow: hidden;
  }
  .signal::after {
    content: ""; position: absolute; top: -1px; left: -20%;
    width: 20%; height: 4px; border-radius: 2px;
    background: linear-gradient(90deg, transparent, var(--sky), transparent);
    box-shadow: 0 0 14px var(--sky);
    animation: sweep 5.5s cubic-bezier(.5,0,.5,1) infinite;
  }
  @keyframes sweep { 0% { left: -22%; } 100% { left: 100%; } }

  /* ── tool grid ── */
  .rack {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
    gap: 16px; padding: 44px 0 12px;
  }
  .module {
    position: relative; display: flex; flex-direction: column;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px; padding: 20px 20px 18px;
    min-height: 176px;
    transition: transform .18s ease, border-color .18s ease, background-color .25s ease;
  }
  /* top hairline that lights up */
  .module::before {
    content: ""; position: absolute; top: 0; left: 18px; right: 18px; height: 2px;
    background: var(--line); border-radius: 2px; transition: background .18s ease, box-shadow .18s ease;
  }
  .module.is-live { cursor: pointer; }
  .module.is-live:hover {
    transform: translateY(-3px); background: var(--panel-2); border-color: var(--line-sky);
  }
  .module.is-live:hover::before { background: var(--sky); box-shadow: 0 0 12px var(--line-sky); }
  .module.is-live:focus-visible {
    outline: 2px solid var(--sky); outline-offset: 3px;
  }

  .m-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; min-height: 14px; }
  .kind { color: var(--dim); font-size: 10.5px; letter-spacing: 2px; text-transform: uppercase; }

  .m-name { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 8px; color: var(--text-strong); }
  .m-blurb { color: var(--muted); font-size: 13.5px; line-height: 1.5; margin: 0; }

  .m-foot { margin-top: auto; padding-top: 16px; min-height: 16px; }
  .open { color: var(--accent); font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
  .open .arw { transition: transform .18s ease; }
  .module.is-live:hover .open .arw { transform: translateX(4px); }

  /* theme toggle */
  .toggle {
    display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
    background: var(--panel); border: 1px solid var(--line); color: var(--muted);
    border-radius: 999px; padding: 6px 12px 6px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.5px; transition: border-color .18s ease, color .18s ease;
  }
  .toggle:hover { border-color: var(--line-sky); color: var(--text); }
  .toggle:focus-visible { outline: 2px solid var(--sky); outline-offset: 2px; }
  .toggle svg { width: 14px; height: 14px; display: block; }

  /* ── footer ── */
  footer { border-top: 1px solid var(--line); margin-top: 40px; padding: 22px 0 40px; }
  .foot-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .foot-row .fmuted { color: var(--dim); font-size: 12.5px; }
  .foot-link {
    color: var(--muted); font-size: 12.5px; font-weight: 500;
    transition: color .18s ease;
  }
  .foot-link:hover { color: var(--accent); }
  .foot-link:focus-visible { outline: 2px solid var(--sky); outline-offset: 3px; border-radius: 3px; }

  @media (max-width: 560px) {
    .hero { padding: 52px 0 12px; }
    .rack { grid-template-columns: 1fr; }
  }
  @media (prefers-reduced-motion: reduce) {
    .signal::after { animation: none; left: 40%; opacity: 0.5; }
    .module { transition: none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <span class="led" aria-hidden="true"></span>
        <span class="name">Polite Robot</span>
      </div>
      <div style="display:flex; align-items:center; gap:16px;">
        <span class="sys mono" id="sys">— tools online</span>
        <button class="toggle" id="themeToggle" type="button" aria-label="Switch color theme">
          <span id="themeIcon" aria-hidden="true"></span>
          <span id="themeLabel">DARK</span>
        </button>
      </div>
    </div>

    <header class="hero">
      <div class="eyebrow mono">Tools for user research</div>
      <p>A suite of focused tools built by a researcher, for researchers — each one does a single job well, from mapping opportunity to tracking whether your recommendations actually get adopted.</p>
      <div class="signal" aria-hidden="true"></div>
    </header>

    <main class="rack" id="rack" aria-label="Polite Robot apps"></main>

    <footer>
      <div class="foot-row">
        <a class="foot-link" href="about.html">About</a>
        <span class="fmuted">Polite Robot · © <span id="yr"></span></span>
      </div>
    </footer>
  </div>

<script>
  (function () {
    // ── theme selector ──
    const root = document.documentElement;
    const sun = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>';
    const moon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
    const icon = document.getElementById("themeIcon");
    const label = document.getElementById("themeLabel");
    function applyTheme(t) {
      root.setAttribute("data-theme", t);
      icon.innerHTML = t === "light" ? sun : moon;
      label.textContent = t === "light" ? "LIGHT" : "DARK";
    }
    let saved = null;
    try { saved = localStorage.getItem("pr-theme"); } catch (e) {}
    const initial = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    applyTheme(initial);
    document.getElementById("themeToggle").addEventListener("click", () => {
      const next = root.getAttribute("data-theme") === "light" ? "dark" : "light";
      applyTheme(next);
      try { localStorage.setItem("pr-theme", next); } catch (e) {}
    });

    // ── app rack ──
    const rack = document.getElementById("rack");
    const esc = (s) => String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

    APPS.forEach(app => {
      const canOpen = app.status === "live" && app.url && app.url !== "#";
      const el = document.createElement(canOpen ? "a" : "div");
      el.className = "module" + (canOpen ? " is-live" : "");
      if (canOpen) { el.href = app.url; el.setAttribute("aria-label", "Open " + app.name); }
      el.innerHTML =
        '<div class="m-top"><span class="kind mono">' + esc(app.kind) + '</span></div>' +
        '<h2 class="m-name">' + esc(app.name) + '</h2>' +
        '<p class="m-blurb">' + esc(app.blurb) + '</p>' +
        '<div class="m-foot">' +
          (canOpen ? '<span class="open">Open <span class="arw">→</span></span>' : '') +
        '</div>';
      rack.appendChild(el);
    });

    document.getElementById("yr").textContent = new Date().getFullYear();
  })();
</script>
</body>
</html>
